name: vercye-dev
channels:
  - conda-forge
  - bioconda
  - pytorch
  - defaults

dependencies:
  # Base runtime (same as environment.yml)
  - python=3.13
  - gdal=3.11
  - click
  - colorlog
  - earthengine-api
  - geopandas
  - google-auth
  - google-auth-oauthlib
  - joblib
  - kaleido=0.2.1
  - matplotlib
  - numpy
  - pandas
  - pathvalidate
  - pillow
  - planetary-computer
  - plotly=6.0.1
  # - pulp=2.7.0
  - pystac_client
  - pyarrow
  - rasterio
  - rasterio-s3
  - requests
  - ruamel.yaml
  - scipy>=1.14
  - scikit-learn
  - seaborn
  - snakemake
  - tenacity
  - pytorch
  - tqdm
  - xhtml2pdf
  - jq

  # Dev tooling
  - pre-commit>=3.5.0
  - black>=24.4.2
  - isort>=5.13.2
  - flake8>=7.1.1
  - bandit>=1.7.10
  - pytest>=8.3.2
  - pytest-cov>=5.0.0
  - mypy>=1.11.2
  - pip
  - pip:
      - types-setuptools>=70.0.0.20240726
      - "STAC-Downloader @ git+https://github.com/rohansaw/STAC-Downloader"
